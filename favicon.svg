<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      .pulse {
        animation: ring-pulse 2.6s ease-out infinite;
        transform-origin: 16px 16px;
      }
      .pulse2 {
        animation: ring-pulse 2.6s ease-out 1.3s infinite;
        transform-origin: 16px 16px;
      }
      @keyframes ring-pulse {
        0%   { r: 14; opacity: 0.6; }
        100% { r: 17; opacity: 0; }
      }
    </style>
  </defs>

  <!-- Navy background — rounded square -->
  <rect width="32" height="32" rx="7" fill="#0A0E1A"/>

  <!-- Animated pulse rings (only visible in SVG favicon supporting browsers) -->
  <circle class="pulse"  cx="16" cy="16" r="14" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0"/>
  <circle class="pulse2" cx="16" cy="16" r="14" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0"/>

  <!-- Outer institutional ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#C9A84C" stroke-width="0.9" opacity="0.9"/>

  <!-- Inner ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>

  <!-- IDR monogram -->
  <text
    x="16" y="18"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="8"
    font-weight="700"
    fill="#C9A84C"
    text-anchor="middle"
    letter-spacing="1">IDR</text>

  <!-- Micro divider line -->
  <line x1="11" y1="19.5" x2="21" y2="19.5" stroke="#8A6F2E" stroke-width="0.5" opacity="0.7"/>
</svg>
