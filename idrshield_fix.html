<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix My Store — IDR Shield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#06080F;color:#F0E8D4;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
*,*::before,*::after{box-sizing:border-box;}
.topbar{background:#06080F;border-bottom:1px solid rgba(212,168,67,.3);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none;}
.seal{width:38px;height:38px;border:1.5px solid #D4A843;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.seal-text{font-size:7px;font-weight:700;letter-spacing:.12em;color:#D4A843;line-height:1;}
.seal-line{width:13px;height:1px;background:#D4A843;margin-top:3px;opacity:.7;}
.logo-lines{display:flex;flex-direction:column;gap:1px;}
.logo-eyebrow{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#D4A843;opacity:.75;}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:#F0E8D4;}
.topbar-tag{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(212,168,67,.6);}
.gold-line{height:1px;background:linear-gradient(90deg,#06080F,#D4A843 50%,#06080F);opacity:.4;}
.content{max-width:680px;margin:0 auto;padding:0 20px 100px;}
.page-header{padding:40px 0 28px;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#D4A843;margin-bottom:10px;opacity:.85;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,7vw,52px);font-weight:700;line-height:1.06;color:#F0E8D4;margin:0 0 12px;}
.page-title em{color:#D4A843;font-style:italic;}
.page-sub{font-size:14px;color:#C4B8A0;line-height:1.72;margin:0;}
.status-card{background:#0C0F22;border:1px solid rgba(212,168,67,.3);border-radius:8px;padding:22px 24px;margin-bottom:28px;position:relative;overflow:hidden;}
.status-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#D4A843,transparent);}
.status-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.status-domain{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#D4A843;margin-bottom:6px;opacity:.85;}
.status-nums{display:flex;align-items:baseline;gap:6px;}
.score-big{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:700;color:#F0E8D4;line-height:1;}
.score-denom{font-family:'Cormorant Garamond',serif;font-size:20px;color:#7A7060;}
.status-pill{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:4px 13px;border-radius:20px;margin-left:10px;}
.pill-m{background:rgba(212,168,67,.15);color:#D4A843;border:1px solid rgba(212,168,67,.3);}
.pill-a{background:rgba(47,168,116,.15);color:#2FA874;border:1px solid rgba(47,168,116,.3);}
.pill-c{background:rgba(217,79,79,.15);color:#F07070;border:1px solid rgba(217,79,79,.3);}
.status-right{font-size:12px;color:#7A7060;text-align:right;}
.section-lbl{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#D4A843;opacity:.8;margin:0 0 14px;}
.success-bar{display:none;background:rgba(47,168,116,.1);border:1px solid rgba(47,168,116,.3);border-radius:6px;padding:14px 18px;margin-bottom:20px;font-size:14px;color:#2FA874;font-weight:500;text-align:center;}
.success-bar.show{display:block;}

/* VIOLATION CARDS */
.vcard{background:#0C0F22;border:1px solid rgba(212,168,67,.2);border-radius:8px;margin-bottom:14px;overflow:hidden;transition:border-color .2s;}
.vcard.v-open{border-color:rgba(212,168,67,.5);}
.vcard.v-resolved{border-color:rgba(47,168,116,.3);opacity:.65;}

/* TAP HINT — the clickable bar at top */
.tap-hint{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(212,168,67,.1);
  border-bottom:1px solid rgba(212,168,67,.15);
  padding:10px 20px;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:rgba(212,168,67,.2);
}
.tap-hint:active{background:rgba(212,168,67,.2);}
.tap-hint-left{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#D4A843;letter-spacing:.04em;}
.tap-hint-left svg{width:14px;height:14px;fill:#D4A843;flex-shrink:0;}
.tap-arrow{font-size:14px;color:#D4A843;transition:transform .25s;}
.vcard.v-open .tap-arrow{transform:rotate(180deg);}
.vcard.v-resolved .tap-hint{display:none;}

/* CARD SUMMARY (always visible) */
.vcard-summary{padding:16px 20px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:rgba(212,168,67,.1);}
.vcard-summary:active{background:rgba(255,255,255,.02);}
.vsev-badge{font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:8px;}
.sev-critical{background:rgba(217,79,79,.15);color:#F07070;border:1px solid rgba(217,79,79,.25);}
.sev-serious{background:rgba(217,123,47,.15);color:#F0A060;border:1px solid rgba(217,123,47,.25);}
.sev-moderate{background:rgba(212,168,67,.15);color:#D4A843;border:1px solid rgba(212,168,67,.25);}
.vname{font-size:15px;font-weight:600;color:#F0E8D4;margin:0 0 6px;}
.vplain{font-size:13px;color:#C4B8A0;line-height:1.65;margin:0 0 6px;}
.vlegal{font-size:11.5px;color:#7A7060;font-style:italic;margin:0;}
.resolved-tag{float:right;font-size:11px;font-weight:600;color:#2FA874;background:rgba(47,168,116,.12);border:1px solid rgba(47,168,116,.25);padding:3px 12px;border-radius:12px;display:none;}
.vcard.v-resolved .resolved-tag{display:inline-block;}

/* CARD BODY — hidden until open */
.vcard-body{display:none;border-top:1px solid rgba(212,168,67,.12);padding:20px;}
.vcard.v-open .vcard-body{display:block;}

.path-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#D4A843;opacity:.85;margin-bottom:12px;}

/* PATH BUTTONS */
.paths{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
@media(max-width:520px){.paths{grid-template-columns:1fr;}}
.path-btn{
  background:#06080F;border:1px solid rgba(212,168,67,.2);border-radius:6px;
  padding:14px 12px;text-align:left;width:100%;
  cursor:pointer;
  -webkit-tap-highlight-color:rgba(212,168,67,.15);
  transition:border-color .18s,background .18s;
}
.path-btn:active,.path-btn.active{border-color:#D4A843;background:rgba(212,168,67,.08);}
.path-icon{font-size:18px;margin-bottom:6px;}
.path-title{font-size:12px;font-weight:700;color:#F0E8D4;margin:0 0 3px;}
.path-desc{font-size:11px;color:#7A7060;line-height:1.5;margin:0;}
.path-diff{display:block;margin-top:6px;font-size:9px;font-weight:600;color:#D4A843;opacity:.7;}

/* GUIDE PANELS */
.guide-wrap{display:none;margin-top:4px;}
.guide-wrap.g-show{display:block;}
.guide-panel{background:#06080F;border:1px solid rgba(212,168,67,.2);border-radius:6px;padding:18px 20px;}
.guide-panel h4{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#D4A843;margin:0 0 14px;}
.step{display:flex;gap:11px;margin-bottom:11px;align-items:flex-start;}
.step-n{width:22px;height:22px;border-radius:50%;background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.3);font-size:10px;font-weight:700;color:#D4A843;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-t{font-size:13px;color:#C4B8A0;line-height:1.6;}
.step-t strong{color:#F0E8D4;}
.clbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin:12px 0 4px;}
.clbl.bad{color:#F07070;}.clbl.good{color:#2FA874;}
.cblock{background:#000;border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:12px 14px;font-family:'Courier New',monospace;font-size:12px;line-height:1.7;overflow-x:auto;white-space:pre-wrap;word-break:break-all;margin:0 0 8px;}
.cblock.bad{color:#F07070;}.cblock.good{color:#2FA874;}
.dev-box{background:#06080F;border:1px solid rgba(212,168,67,.2);border-radius:5px;padding:14px 16px;}
.dev-subj{font-size:11px;font-weight:700;color:#D4A843;margin-bottom:8px;}
.dev-body-txt{font-size:12px;color:#C4B8A0;line-height:1.75;white-space:pre-wrap;}
.copy-btn{margin-top:10px;padding:8px 18px;background:transparent;color:#D4A843;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;border:1px solid rgba(212,168,67,.3);border-radius:3px;cursor:pointer;-webkit-tap-highlight-color:rgba(212,168,67,.2);}
.copy-btn:active{background:rgba(212,168,67,.1);}

/* MARK FIXED */
.mark-row{margin-top:18px;padding-top:14px;border-top:1px solid rgba(212,168,67,.12);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.mark-btn{padding:12px 24px;background:#D4A843;color:#06080F;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;box-shadow:0 3px 14px rgba(212,168,67,.3);-webkit-tap-highlight-color:rgba(212,168,67,.3);}
.mark-btn:active{background:#c89a35;}
.mark-note{font-size:11.5px;color:#7A7060;}

/* SUBMIT */
.submit-card{background:#0C0F22;border:1px solid rgba(212,168,67,.25);border-radius:8px;padding:28px 24px;margin-top:8px;text-align:center;position:relative;overflow:hidden;}
.submit-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#D4A843,transparent);}
.submit-title{font-size:17px;font-weight:600;color:#F0E8D4;margin-bottom:6px;}
.submit-sub{font-size:13px;color:#7A7060;margin-bottom:20px;line-height:1.6;}
.submit-btn{padding:16px 40px;background:#D4A843;color:#06080F;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;box-shadow:0 4px 22px rgba(212,168,67,.35);-webkit-tap-highlight-color:rgba(212,168,67,.3);}
.submit-btn:active{background:#c89a35;}
.submit-btn:disabled{background:rgba(212,168,67,.25);box-shadow:none;cursor:not-allowed;}

/* WAITLIST */
.waitlist-card{background:rgba(212,168,67,.05);border:1px solid rgba(212,168,67,.2);border-radius:8px;padding:28px 24px;margin-top:24px;text-align:center;}
.waitlist-eyebrow{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#D4A843;border:1px solid rgba(212,168,67,.3);border-radius:20px;padding:4px 14px;margin-bottom:12px;}
.waitlist-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#F0E8D4;margin:0 0 8px;}
.waitlist-sub{font-size:13px;color:#C4B8A0;line-height:1.65;margin:0 0 20px;}
.waitlist-form{display:flex;gap:8px;max-width:420px;margin:0 auto;}
@media(max-width:480px){.waitlist-form{flex-direction:column;}}
.waitlist-input{flex:1;padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(212,168,67,.25);border-radius:3px;color:#F0E8D4;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.waitlist-input:focus{border-color:#D4A843;}
.waitlist-input::placeholder{color:rgba(240,232,212,.25);}
.waitlist-btn{padding:12px 22px;background:#D4A843;color:#06080F;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:rgba(212,168,67,.3);}
.waitlist-btn:active{background:#c89a35;}
.waitlist-ok{display:none;font-size:13px;color:#2FA874;font-weight:500;margin-top:12px;}
.waitlist-ok.show{display:block;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:20px;}
.modal-bg.show{display:flex;}
.modal-box{background:#0C0F22;border:1px solid rgba(212,168,67,.35);border-radius:8px;padding:30px 26px;max-width:420px;width:100%;}
.modal-title{font-size:17px;font-weight:600;color:#F0E8D4;margin:0 0 6px;}
.modal-sub{font-size:13px;color:#7A7060;margin:0 0 18px;line-height:1.6;}
.modal-err{font-size:12px;color:#F07070;margin-bottom:8px;display:none;}
.modal-input{width:100%;padding:13px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(212,168,67,.25);border-radius:3px;color:#F0E8D4;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:12px;}
.modal-input:focus{border-color:#D4A843;}
.modal-input::placeholder{color:rgba(240,232,212,.25);}
.modal-btns{display:flex;gap:8px;}
.modal-go{flex:1;padding:13px;background:#D4A843;color:#06080F;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;}
.modal-go:active{background:#c89a35;}
.modal-cancel-btn{padding:13px 16px;background:transparent;color:#7A7060;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;border:1px solid rgba(240,232,212,.12);border-radius:3px;cursor:pointer;}

.loading-wrap{text-align:center;padding:80px 20px;}
.spinner{width:30px;height:30px;border:2px solid rgba(212,168,67,.2);border-top-color:#D4A843;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
.state-sub{font-size:14px;color:#7A7060;}
.clean-wrap{text-align:center;padding:60px 20px;}
.clean-icon{font-size:44px;margin-bottom:12px;}
.clean-ttl{font-family:'Cormorant Garamond',serif;font-size:34px;color:#2FA874;margin-bottom:10px;}
.clean-sub{font-size:14px;color:#7A7060;max-width:360px;margin:0 auto;line-height:1.7;}
footer{text-align:center;padding:24px 20px 40px;border-top:1px solid rgba(240,232,212,.06);font-size:11px;color:rgba(240,232,212,.28);line-height:1.8;margin-top:20px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

</div>

    ],
    cbefore: 'color: #999;\nbackground: #fff;\n/* Fails — ratio 2.9:1 */',
    cafter:  'color: #333;\nbackground: #fff;\n/* Passes — ratio 12.6:1 */',
    diff: '⭐ Fixable in theme settings',
  },
};

var CAT_ORDER = ['alt_text','form_labels','aria_links','keyboard_nav','heading_structure','contrast'];

// ── Boot ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  var path  = window.location.pathname.split('/').filter(Boolean);
  IDR_domain = (path[0] === 'fix' && path[1]) ? path[1]
             : new URLSearchParams(window.location.search).get('domain') || '';

  // Wire modal buttons
  document.getElementById('modalGoBtn').addEventListener('click', IDR_confirmSubmit);
  document.getElementById('modalCancelBtn').addEventListener('click', IDR_closeModal);

  if (!IDR_domain) {
    IDR_showError('No domain specified', 'Please use the link from your IDR Shield email.');
    return;
  }
  IDR_loadPage();
});

function IDR_loadPage() {
  fetch(BACKEND + '/api/registry/' + IDR_domain)
    .then(function(r) { return r.json(); })
    .then(function(reg) {
      if (reg.error) { IDR_showError('Store not found', 'No registry record for ' + IDR_domain + '. Please use the link from your IDR Shield email.'); return; }
      IDR_registry = reg;
      IDR_buildPage();
    })
    .catch(function() { IDR_showError('Connection error', 'Could not reach the IDR server. Please try again.'); });
}

function IDR_buildPage() {
  var score    = IDR_registry.latest_score   || 0;
  var critical = IDR_registry.critical_count || 0;
  var status   = IDR_registry.status         || 'monitoring';
  var lastScan = IDR_registry.last_scanned   || '';
  var dateStr  = lastScan ? new Date(lastScan).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '—';

  var pillCls = status === 'active' ? 'pill-a' : (critical >= 3 ? 'pill-c' : 'pill-m');
  var pillLbl = status === 'active' ? 'Active' : (status === 'monitoring' ? 'Monitoring' : 'Expired');

  var html = '';

  // Header
  html += '<div class="page-header">';
  html += '<p class="eyebrow">Fix Portal</p>';
  html += '<h1 class="page-title">Your open <em>violations.</em></h1>';
  html += '<p class="page-sub">Tap any issue to see how to fix it. Mark each one done, then submit — we\'ll run a confirmation scan automatically.</p>';
  html += '</div>';

  // Status card
  html += '<div class="status-card">';
  html += '<div class="status-row">';
  html += '<div><p class="status-domain">' + IDR_domain + '</p>';
  html += '<div class="status-nums"><span class="score-big">' + score + '</span><span class="score-denom">&nbsp;/ 100</span><span class="status-pill ' + pillCls + '">' + pillLbl + '</span></div></div>';
  html += '<div class="status-right">Last scanned<br>' + dateStr + '</div>';
  html += '</div></div>';

  // Success banner
  html += '<div class="success-bar" id="successBar">&#x2713; &nbsp;Fix report submitted — confirmation scan running. Check your email for results.</div>';

  if (status === 'active' && critical === 0) {
    html += '<div class="clean-wrap"><div class="clean-icon">&#x2705;</div><h2 class="clean-ttl">Your store is clean.</h2><p class="clean-sub">No open violations in your latest scan. Registry updated. We\'ll continue monitoring weekly.</p></div>';
  } else {
    html += '<p class="section-lbl">Open Issues (' + CAT_ORDER.length + ')</p>';
    CAT_ORDER.forEach(function(cat) {
      if (VIO[cat]) html += IDR_renderCard(cat);
    });
    // Submit card
    html += '<div class="submit-card">';
    html += '<p class="submit-title">Ready to verify your fixes?</p>';
    html += '<p class="submit-sub">Mark each issue you\'ve fixed above. Then tap the button — we\'ll rescan your store and email you the result.</p>';
    html += '<button class="submit-btn" id="submitBtn" onclick="IDR_openModal()">Submit for Confirmation Scan &#x2192;</button>';
    html += '</div>';
  }

  // Waitlist
  html += '<div class="waitlist-card">';
  html += '<span class="waitlist-eyebrow">Coming Soon</span>';
  html += '<h3 class="waitlist-title">Don\'t have time to fix this yourself?</h3>';
  html += '<p class="waitlist-sub">IDR Approved Developers — vetted specialists who fix accessibility issues and verify through our system automatically. Join the waitlist to be first notified.</p>';
  html += '<div class="waitlist-form">';
  html += '<input class="waitlist-input" id="waitlistInput" type="email" placeholder="your@email.com" autocomplete="email">';
  html += '<button class="waitlist-btn" onclick="IDR_joinWaitlist()">Join Waitlist</button>';
  html += '</div>';
  html += '<p class="waitlist-ok" id="waitlistOk">&#x2713; You\'re on the list — we\'ll notify you when IDR Approved Developers launch.</p>';
  html += '</div>';

  document.getElementById('appRoot').innerHTML = html;
}

function IDR_renderCard(cat) {
  var v = VIO[cat];
  var sevCls = 'sev-' + v.sev;
  var sevLbl = v.sev.charAt(0).toUpperCase() + v.sev.slice(1);

  var shopifySteps = v.shopify.map(function(s, i) {
    return '<div class="step"><span class="step-n">' + (i+1) + '</span><span class="step-t">' + s + '</span></div>';
  }).join('');

  var devEmail = IDR_buildDevEmail(cat, v);

  return '' +
    '<div class="vcard" id="vc-' + cat + '">' +

    // TAP HINT BAR
    '<div class="tap-hint" onclick="IDR_toggleCard(\'' + cat + '\')">' +
    '<span class="tap-hint-left"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>Tap to see how to fix this</span>' +
    '<span class="tap-arrow">&#x25BC;</span>' +
    '</div>' +

    // SUMMARY
    '<div class="vcard-summary" onclick="IDR_toggleCard(\'' + cat + '\')">' +
    '<span class="resolved-tag">&#x2713; Marked as Fixed</span>' +
    '<span class="vsev-badge ' + sevCls + '">' + sevLbl + '</span>' +
    '<p class="vname">' + v.name + '</p>' +
    '<p class="vplain">' + v.plain + '</p>' +
    '<p class="vlegal">&#x2696; &nbsp;' + v.legal + '</p>' +
    '</div>' +

    // BODY
    '<div class="vcard-body">' +
    '<p class="path-lbl">Choose how you\'d like to fix this:</p>' +

    // PATH BUTTONS
    '<div class="paths">' +

    '<button class="path-btn" id="pb-' + cat + '-shopify" onclick="IDR_showGuide(\'' + cat + '\', \'shopify\')">' +
    '<div class="path-icon">&#x1F6CD;</div>' +
    '<p class="path-title">Fix it myself</p>' +
    '<p class="path-desc">Shopify step-by-step — no code needed for most</p>' +
    '<span class="path-diff">' + v.diff + '</span>' +
    '</button>' +

    '<button class="path-btn" id="pb-' + cat + '-dev" onclick="IDR_showGuide(\'' + cat + '\', \'dev\')">' +
    '<div class="path-icon">&#x1F4E7;</div>' +
    '<p class="path-title">Send to developer</p>' +
    '<p class="path-desc">Pre-written email — just copy and forward</p>' +
    '<span class="path-diff">&#x1F4CB; Copy &amp; send</span>' +
    '</button>' +

    '<button class="path-btn" id="pb-' + cat + '-code" onclick="IDR_showGuide(\'' + cat + '\', \'code\')">' +
    '<div class="path-icon">&#x1F4BB;</div>' +
    '<p class="path-title">See the code</p>' +
    '<p class="path-desc">Before/after code for developers</p>' +
    '<span class="path-diff">&#x2699; Technical</span>' +
    '</button>' +

    '</div>' + // .paths

    // GUIDE PANELS
    '<div class="guide-wrap" id="gw-' + cat + '">' +

    // Shopify
    '<div id="gp-' + cat + '-shopify" class="guide-panel" style="display:none;">' +
    '<h4>&#x1F6CD; &nbsp;Shopify Fix Guide</h4>' +
    shopifySteps +
    '</div>' +

    // Dev
    '<div id="gp-' + cat + '-dev" class="guide-panel" style="display:none;">' +
    '<h4>&#x1F4E7; &nbsp;Forward This to Your Developer</h4>' +
    '<div class="dev-box">' +
    '<p class="dev-subj">Subject: Accessibility fix needed on ' + IDR_domain + '</p>' +
    '<p class="dev-body-txt" id="devtxt-' + cat + '">' + IDR_esc(devEmail) + '</p>' +
    '</div>' +
    '<button class="copy-btn" onclick="IDR_copyDev(\'' + cat + '\')">&#x270D; Copy to Clipboard</button>' +
    '</div>' +

    // Code
    '<div id="gp-' + cat + '-code" class="guide-panel" style="display:none;">' +
    '<h4>&#x1F4BB; &nbsp;Code Fix</h4>' +
    '<p class="clbl bad">&#x2717; Before — violation</p>' +
    '<div class="cblock bad">' + IDR_esc(v.cbefore) + '</div>' +
    '<p class="clbl good">&#x2713; After — corrected</p>' +
    '<div class="cblock good">' + IDR_esc(v.cafter) + '</div>' +
    '</div>' +

    '</div>' + // .guide-wrap

    // MARK FIXED
    '<div class="mark-row">' +
    '<button class="mark-btn" onclick="IDR_markFixed(\'' + cat + '\')">&#x2713; &nbsp;I\'ve Fixed This</button>' +
    '<span class="mark-note">We\'ll verify automatically when you submit</span>' +
    '</div>' +

    '</div>' + // .vcard-body
    '</div>';  // .vcard
}

// ── Card toggle ───────────────────────────────────────────────────────────────
function IDR_toggleCard(cat) {
  var card = document.getElementById('vc-' + cat);
  if (!card || card.classList.contains('v-resolved')) return;
  var wasOpen = card.classList.contains('v-open');
  // Close all
  document.querySelectorAll('.vcard.v-open').forEach(function(c) { c.classList.remove('v-open'); });
  // Open this one if it was closed
  if (!wasOpen) card.classList.add('v-open');
}

// ── Show fix guide ────────────────────────────────────────────────────────────
function IDR_showGuide(cat, type) {
  // Show guide wrapper
  var gw = document.getElementById('gw-' + cat);
  if (gw) gw.classList.add('g-show');

  // Hide all panels
  ['shopify', 'dev', 'code'].forEach(function(t) {
    var el = document.getElementById('gp-' + cat + '-' + t);
    if (el) el.style.display = 'none';
    var btn = document.getElementById('pb-' + cat + '-' + t);
    if (btn) btn.classList.remove('active');
  });

  // Show selected
  var panel = document.getElementById('gp-' + cat + '-' + type);
  if (panel) panel.style.display = 'block';
  var btn = document.getElementById('pb-' + cat + '-' + type);
  if (btn) btn.classList.add('active');
}

// ── Mark fixed ────────────────────────────────────────────────────────────────
function IDR_markFixed(cat) {
  IDR_marked[cat] = true;
  var card = document.getElementById('vc-' + cat);
  if (card) {
    card.classList.remove('v-open');
    card.classList.add('v-resolved');
  }
}

// ── Copy dev email ────────────────────────────────────────────────────────────
function IDR_copyDev(cat) {
  var el = document.getElementById('devtxt-' + cat);
  if (!el) return;
  var btn = el.closest('.guide-panel').querySelector('.copy-btn');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(el.innerText).then(function() {
      if (btn) { btn.textContent = '✓ Copied!'; setTimeout(function() { btn.textContent = '✍ Copy to Clipboard'; }, 2500); }
    });
  } else {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = el.innerText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(function() { btn.textContent = '✍ Copy to Clipboard'; }, 2500); }
  }
}

// ── Submit flow ───────────────────────────────────────────────────────────────
function IDR_openModal() {
  var fixed = Object.keys(IDR_marked).filter(function(k) { return IDR_marked[k]; });
  if (fixed.length === 0) {
    alert('Please mark at least one issue as fixed before submitting.');
    return;
  }
  // Check if email already in URL
  var params = new URLSearchParams(window.location.search);
  var urlEmail = params.get('email') || '';
  if (urlEmail && urlEmail.indexOf('@') !== -1) {
    IDR_doSubmit(urlEmail);
    return;
  }
  document.getElementById('modalBg').classList.add('show');
  setTimeout(function() { document.getElementById('modalEmailInput').focus(); }, 150);
}

function IDR_closeModal() {
  document.getElementById('modalBg').classList.remove('show');
  document.getElementById('modalErr').style.display = 'none';
}

function IDR_confirmSubmit() {
  var email = document.getElementById('modalEmailInput').value.trim();
  if (!email || email.indexOf('@') === -1) {
    document.getElementById('modalErr').style.display = 'block';
    return;
  }
  document.getElementById('modalErr').style.display = 'none';
  IDR_closeModal();
  IDR_doSubmit(email);
}

function IDR_doSubmit(email) {
  var fixed     = Object.keys(IDR_marked).filter(function(k) { return IDR_marked[k]; });
  var params    = new URLSearchParams(window.location.search);
  var receiptId = params.get('receipt') || 'IDR-PENDING';
  var btn       = document.getElementById('submitBtn');

  if (btn) { btn.disabled = true; btn.textContent = 'Running confirmation scan\u2026'; }

  fetch(BACKEND + '/api/fix-report', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, domain: IDR_domain, receipt_id: receiptId, categories: fixed })
  })
  .then(function(r) { return r.json(); })
  .then(function() {
    if (btn) btn.style.display = 'none';
    var bar = document.getElementById('successBar');
    if (bar) bar.classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  })
  .catch(function() {
    if (btn) { btn.disabled = false; btn.textContent = 'Submit for Confirmation Scan \u2192'; }
    alert('Something went wrong. Please try again or email hello@idrshield.com');
  });
}

// ── Waitlist ──────────────────────────────────────────────────────────────────
function IDR_joinWaitlist() {
  var email = document.getElementById('waitlistInput').value.trim();
  if (!email || email.indexOf('@') === -1) {
    document.getElementById('waitlistInput').focus();
    return;
  }
  document.getElementById('waitlistInput').style.display = 'none';
  document.querySelector('.waitlist-btn').style.display = 'none';
  document.getElementById('waitlistOk').classList.add('show');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function IDR_buildDevEmail(cat, v) {
  return 'Hi,\n\nOur store (' + IDR_domain + ') needs an accessibility fix. We\'re enrolled in IDR Shield compliance monitoring and this issue was flagged in our latest scan.\n\nISSUE: ' + v.name + '\nSEVERITY: ' + v.sev.toUpperCase() + '\n\nWHY THIS MATTERS:\n' + v.plain + '\n\nTHE FIX:\n\nBefore (violation):\n' + v.cbefore + '\n\nAfter (corrected):\n' + v.cafter + '\n\nPlease fix this as soon as possible. Our monitoring system will verify the change automatically.\n\nThank you';
}

function IDR_showError(title, sub) {
  document.getElementById('appRoot').innerHTML =
    '<div class="clean-wrap"><div class="clean-icon">&#x26A0;</div>' +
    '<h2 style="color:#F07070;font-size:20px;margin-bottom:8px;">' + title + '</h2>' +
    '<p class="clean-sub">' + sub + '</p></div>';
}

function IDR_esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
