<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix My Store — IDR Shield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
html, body {
  margin:0; padding:0;
  background-color:#06080F !important;
  color:#F0E8D4;
  font-family:'DM Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
*, *::before, *::after { box-sizing:border-box; }
.page-wrap { background-color:#06080F; min-height:100vh; }

/* TOPBAR */
.topbar {
  background-color:#06080F;
  border-bottom:1px solid rgba(212,168,67,0.3);
  padding:14px 28px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
.seal {
  width:38px; height:38px;
  border:1.5px solid #D4A843; border-radius:50%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.seal-text { font-size:7px; font-weight:700; letter-spacing:0.12em; color:#D4A843; line-height:1; }
.seal-line  { width:13px; height:1px; background:#D4A843; margin-top:3px; opacity:0.7; }
.logo-lines { display:flex; flex-direction:column; gap:1px; }
.logo-eyebrow { font-size:8px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#D4A843; opacity:0.75; }
.logo-name { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; color:#F0E8D4; }
.gold-line { height:1px; background:linear-gradient(90deg,#06080F,#D4A843 50%,#06080F); opacity:0.4; }

/* CONTENT */
.content { max-width:700px; margin:0 auto; padding:0 24px 100px; }

/* HEADER BLOCK */
.page-header { padding:48px 0 32px; }
.page-eyebrow {
  font-size:9px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase;
  color:#D4A843; margin-bottom:10px; opacity:0.85;
}
.page-title {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(34px,6vw,48px); font-weight:700; line-height:1.06;
  color:#F0E8D4; margin:0 0 12px;
}
.page-title em { color:#D4A843; font-style:italic; }
.page-sub { font-size:15px; color:#C4B8A0; line-height:1.72; margin:0; }

/* STATUS CARD */
.status-card {
  background:#0C0F22;
  border:1px solid rgba(212,168,67,0.3);
  border-radius:6px;
  padding:24px 28px;
  margin-bottom:28px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
  position:relative; overflow:hidden;
}
.status-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,#D4A843,transparent);
}
.status-domain { font-size:11px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#D4A843; opacity:0.8; margin-bottom:4px; }
.status-info { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
.status-score { font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:700; color:#F0E8D4; line-height:1; }
.status-score-denom { font-family:'Cormorant Garamond',serif; font-size:18px; color:#7A7060; }
.status-pill {
  font-size:9px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;
  padding:5px 14px; border-radius:20px;
}
.pill-monitoring { background:rgba(212,168,67,0.15); color:#D4A843; border:1px solid rgba(212,168,67,0.3); }
.pill-active     { background:rgba(47,168,116,0.15); color:#2FA874; border:1px solid rgba(47,168,116,0.3); }
.pill-critical   { background:rgba(217,79,79,0.15);  color:#F07070; border:1px solid rgba(217,79,79,0.3); }
.status-meta { font-size:12px; color:#7A7060; }

/* SECTION LABEL */
.section-label {
  font-size:9px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase;
  color:#D4A843; opacity:0.8; margin:0 0 16px;
}

/* VIOLATION CARD */
.violation-card {
  background:#0C0F22;
  border:1px solid rgba(212,168,67,0.2);
  border-radius:6px;
  margin-bottom:16px;
  overflow:hidden;
  transition:border-color 0.2s;
}
.violation-card.resolved {
  border-color:rgba(47,168,116,0.3);
  opacity:0.65;
}
.violation-card.resolved .violation-header { background:rgba(47,168,116,0.06); }

.violation-header {
  padding:20px 24px;
  display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
  cursor:pointer;
  user-select:none;
}
.violation-header:hover { background:rgba(212,168,67,0.03); }

.violation-left { flex:1; }
.violation-severity {
  font-size:8.5px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;
  padding:3px 10px; border-radius:10px; display:inline-block; margin-bottom:8px;
}
.sev-critical { background:rgba(217,79,79,0.15); color:#F07070; border:1px solid rgba(217,79,79,0.25); }
.sev-serious  { background:rgba(217,123,47,0.15); color:#F0A060; border:1px solid rgba(217,123,47,0.25); }
.sev-moderate { background:rgba(212,168,67,0.15); color:#D4A843; border:1px solid rgba(212,168,67,0.25); }

.violation-name { font-size:16px; font-weight:600; color:#F0E8D4; margin:0 0 6px; }
.violation-plain { font-size:13px; color:#C4B8A0; line-height:1.6; margin:0 0 6px; }
.violation-legal { font-size:12px; color:#7A7060; font-style:italic; }
.violation-count { font-size:12px; color:#D4A843; font-weight:600; margin-top:6px; }

.violation-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.chevron { font-size:18px; color:#7A7060; transition:transform 0.2s; }
.violation-card.open .chevron { transform:rotate(180deg); }

.resolved-badge {
  display:none; font-size:11px; font-weight:600; color:#2FA874;
  background:rgba(47,168,116,0.12); border:1px solid rgba(47,168,116,0.25);
  padding:4px 12px; border-radius:12px;
}
.violation-card.resolved .resolved-badge { display:inline-block; }
.violation-card.resolved .chevron { display:none; }

/* VIOLATION BODY */
.violation-body {
  display:none;
  padding:0 24px 24px;
  border-top:1px solid rgba(212,168,67,0.12);
}
.violation-card.open .violation-body { display:block; }

/* FIX PATHS */
.fix-paths {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:20px 0;
}
@media(max-width:580px){ .fix-paths { grid-template-columns:1fr; } }

.fix-path {
  background:#06080F;
  border:1px solid rgba(212,168,67,0.18);
  border-radius:5px;
  padding:16px 14px;
  cursor:pointer;
  transition:border-color 0.2s, background 0.2s;
}
.fix-path:hover { border-color:#D4A843; background:rgba(212,168,67,0.04); }
.fix-path-icon { font-size:20px; margin-bottom:8px; }
.fix-path-title { font-size:12px; font-weight:700; color:#F0E8D4; margin-bottom:4px; }
.fix-path-desc { font-size:11px; color:#7A7060; line-height:1.5; }
.fix-path-difficulty {
  display:inline-block; margin-top:8px;
  font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
  color:#D4A843; opacity:0.7;
}

/* EXPANDED FIX GUIDE */
.fix-guide { display:none; }
.fix-guide.show { display:block; }

.guide-panel {
  background:#06080F;
  border:1px solid rgba(212,168,67,0.2);
  border-radius:5px;
  padding:20px;
  margin-top:10px;
}
.guide-panel h4 {
  font-size:11px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;
  color:#D4A843; margin:0 0 14px;
}
.guide-step {
  display:flex; gap:12px; margin-bottom:12px; align-items:flex-start;
}
.guide-step-num {
  width:22px; height:22px; border-radius:50%;
  background:rgba(212,168,67,0.15); border:1px solid rgba(212,168,67,0.3);
  font-size:10px; font-weight:700; color:#D4A843;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.guide-step-text { font-size:13px; color:#C4B8A0; line-height:1.6; }
.guide-step-text strong { color:#F0E8D4; }

.code-block {
  background:#000;
  border:1px solid rgba(212,168,67,0.15);
  border-radius:4px;
  padding:14px 16px;
  font-family:'Courier New',monospace;
  font-size:12px;
  color:#C4B8A0;
  margin:12px 0;
  overflow-x:auto;
  line-height:1.7;
  white-space:pre-wrap;
  word-break:break-all;
}
.code-label { font-size:9px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:#7A7060; margin-bottom:4px; }
.code-good { color:#2FA874; }
.code-bad  { color:#F07070; }

.dev-email-box {
  background:#06080F;
  border:1px solid rgba(212,168,67,0.2);
  border-radius:5px;
  padding:16px 18px;
}
.dev-email-subject { font-size:12px; font-weight:700; color:#D4A843; margin-bottom:8px; }
.dev-email-body { font-size:12px; color:#C4B8A0; line-height:1.75; white-space:pre-wrap; }
.copy-btn {
  margin-top:12px;
  padding:8px 18px;
  background:transparent; color:#D4A843;
  font-family:'DM Sans',sans-serif;
  font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase;
  border:1px solid rgba(212,168,67,0.3); border-radius:3px;
  cursor:pointer; transition:border-color 0.18s, color 0.18s;
}
.copy-btn:hover { border-color:#D4A843; color:#E8BC55; }
.copy-btn.copied { color:#2FA874; border-color:rgba(47,168,116,0.4); }

/* MARK AS FIXED */
.mark-fixed-row {
  margin-top:20px;
  padding-top:16px;
  border-top:1px solid rgba(212,168,67,0.12);
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.mark-fixed-btn {
  padding:12px 24px;
  background:#D4A843; color:#06080F;
  font-family:'DM Sans',sans-serif;
  font-size:11px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;
  border:none; border-radius:3px; cursor:pointer;
  box-shadow:0 3px 16px rgba(212,168,67,0.3);
  transition:background 0.18s, box-shadow 0.18s;
}
.mark-fixed-btn:hover { background:#E8BC55; box-shadow:0 4px 24px rgba(212,168,67,0.45); }
.mark-fixed-btn:disabled { background:rgba(212,168,67,0.25); box-shadow:none; cursor:not-allowed; }
.mark-fixed-note { font-size:12px; color:#7A7060; }

/* SUBMIT SECTION */
.submit-section {
  background:#0C0F22;
  border:1px solid rgba(212,168,67,0.25);
  border-radius:6px;
  padding:28px;
  margin-top:8px;
  text-align:center;
}
.submit-title { font-size:16px; font-weight:600; color:#F0E8D4; margin-bottom:6px; }
.submit-sub { font-size:13px; color:#7A7060; margin-bottom:20px; }
.submit-btn {
  padding:16px 40px;
  background:#D4A843; color:#06080F;
  font-family:'DM Sans',sans-serif;
  font-size:11.5px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;
  border:none; border-radius:3px; cursor:pointer;
  box-shadow:0 4px 24px rgba(212,168,67,0.35);
  transition:background 0.18s, box-shadow 0.18s;
}
.submit-btn:hover { background:#E8BC55; box-shadow:0 6px 32px rgba(212,168,67,0.5); }
.submit-btn:disabled { background:rgba(212,168,67,0.25); box-shadow:none; cursor:not-allowed; }
.submit-spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(6,8,15,0.25); border-top-color:#06080F; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:8px; display:none; }

/* VENDOR PLACEHOLDER */
.vendor-block {
  background:rgba(212,168,67,0.04);
  border:1px solid rgba(212,168,67,0.2);
  border-radius:6px;
  padding:24px 28px;
  margin-top:28px;
  text-align:center;
}
.vendor-title { font-size:14px; font-weight:600; color:#F0E8D4; margin-bottom:6px; }
.vendor-sub { font-size:13px; color:#7A7060; margin-bottom:14px; }
.vendor-coming {
  display:inline-block;
  font-size:9px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;
  color:#D4A843; border:1px solid rgba(212,168,67,0.3); border-radius:20px; padding:4px 14px;
}

/* STATES */
.loading-state { text-align:center; padding:80px 24px; }
.loading-spinner { width:32px; height:32px; border:2px solid rgba(212,168,67,0.2); border-top-color:#D4A843; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
.loading-text { font-size:14px; color:#7A7060; }
.error-state { text-align:center; padding:80px 24px; }
.error-icon { font-size:36px; margin-bottom:12px; }
.error-title { font-size:18px; color:#F07070; margin-bottom:8px; }
.error-sub { font-size:13px; color:#7A7060; }
.clean-state { text-align:center; padding:60px 24px; }
.clean-icon { font-size:48px; margin-bottom:12px; }
.clean-title { font-family:'Cormorant Garamond',serif; font-size:32px; color:#2FA874; margin-bottom:10px; }
.clean-sub { font-size:14px; color:#7A7060; max-width:380px; margin:0 auto; line-height:1.7; }

/* SUCCESS */
.success-banner {
  display:none;
  background:rgba(47,168,116,0.1);
  border:1px solid rgba(47,168,116,0.3);
  border-radius:6px;
  padding:16px 20px;
  margin-bottom:20px;
  font-size:14px; color:#2FA874; font-weight:500;
  text-align:center;
}
.success-banner.show { display:block; }

.footer {
  text-align:center; padding:28px 24px 48px;
  border-top:1px solid rgba(240,232,212,0.07);
  font-size:11px; color:rgba(240,232,212,0.28); line-height:1.8;
}

@keyframes spin { to { transform:rotate(360deg); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.animate { animation:fadeUp 0.4s ease both; }
</style>
</head>
<body>
<div class="page-wrap">

<header class="topbar">
  <a class="logo" href="https://idrshield.com">
    <div class="seal"><span class="seal-text">IDR</span><div class="seal-line"></div></div>
    <div class="logo-lines">
      <span class="logo-eyebrow">Institute of Digital Remediation</span>
      <span class="logo-name">IDR Shield</span>
    </div>

<div class="content">
  <div id="appRoot">
    <div class="loading-state">
      <div class="loading-spinner"></div>

</div>

<footer class="footer">
  Institute of Digital Remediation &nbsp;·&nbsp; idrshield.com &nbsp;·&nbsp; Not a law firm &nbsp;·&nbsp; IDR-PROTOCOL-2026

</div>

// ── Get domain from URL ───────────────────────────────────────────────────────
function getDomain() {
  var path  = window.location.pathname;
  var parts = path.split('/').filter(Boolean);
  // Expects /fix/domain.com
  if (parts[0] === 'fix' && parts[1]) return parts[1];
  // Fallback: query param
  var params = new URLSearchParams(window.location.search);
  return params.get('domain') || '';
}

// ── State ─────────────────────────────────────────────────────────────────────

var registry     = null;
var markedFixed  = {};   // category → true
var activeGuide  = {};   // category → 'shopify'|'code'|'dev'

// ── Init ──────────────────────────────────────────────────────────────────────
if (!domain) {
  showError('No domain specified', 'Please use the link from your IDR Shield email.');
} else {
  loadData();
}

function loadData() {
  fetch(BACKEND + '/api/registry/' + domain)
    .then(function(r) { return r.json(); })
    .then(function(reg) {
      registry = reg;
      if (reg.error) return showError('Store not found', 'No registry record found for ' + domain + '. Please use the link from your IDR Shield email.');
      render();
    })
    .catch(function() {
      showError('Connection error', 'Could not reach the IDR server. Please try again in a moment.');
    });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  var score    = registry.latest_score   || 0;
  var critical = registry.critical_count || 0;
  var status   = registry.status        || 'monitoring';
  var lastScan = registry.last_scanned  || '';

  // Pull current open violations from registry scan data
  // We'll fetch the latest receipt for full category breakdown
  fetch(BACKEND + '/api/registry/' + domain)
    .then(function() {
      // Get the latest scan receipts to extract categories
      return fetch(BACKEND + '/api/fix-status/' + domain);
    })
    .then(function(r) { return r.json(); })
    .then(function(fixStatus) {
      renderPage(score, critical, status, lastScan, fixStatus);
    })
    .catch(function() {
      renderPage(score, critical, status, lastScan, {});
    });
}

function renderPage(score, critical, status, lastScan, fixStatus) {
  var pillClass = status === 'active' ? 'pill-active' : (critical >= 3 ? 'pill-critical' : 'pill-monitoring');
  var pillLabel = status === 'active' ? 'Active' : (status === 'monitoring' ? 'Monitoring' : 'Expired');

  var lastScanStr = lastScan ? new Date(lastScan).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }) : 'Unknown';

  var html = '';

  // Page header
  html += '<div class="page-header animate">';
  html += '<p class="page-eyebrow">Fix Portal</p>';
  html += '<h1 class="page-title">Your open <em>violations.</em></h1>';
  html += '<p class="page-sub">Fix each issue below. Mark it when done. We\'ll run a confirmation scan automatically.</p>';
  html += '</div>';

  // Status card
  html += '<div class="status-card animate">';
  html += '<div>';
  html += '<p class="status-domain">' + domain + '</p>';
  html += '<div class="status-info">';
  html += '<span class="status-score">' + score + '<span class="status-score-denom"> / 100</span></span>';
  html += '<span class="status-pill ' + pillClass + '">' + pillLabel + '</span>';
  html += '</div>';
  html += '</div>';
  html += '<div class="status-meta">Last scanned: ' + lastScanStr + '</div>';
  html += '</div>';

  // Success banner (hidden by default)
  html += '<div class="success-banner" id="successBanner">&#x2713; &nbsp;Fix report submitted — your confirmation scan is running. We\'ll email you the result.</div>';

  // Check if all clean
  var pendingFixes = fixStatus.summary ? fixStatus.summary.pending : [];
  if (status === 'active' && critical === 0) {
    html += renderCleanState();
  } else {
    html += renderViolations(score, critical, fixStatus);
  }

  // Vendor placeholder
  html += '<div class="vendor-block animate">';
  html += '<p class="vendor-title">Don\'t have time to fix this yourself?</p>';
  html += '<p class="vendor-sub">IDR Approved Developers — vetted specialists who fix accessibility issues and verify through our system automatically.</p>';
  html += '<span class="vendor-coming">Coming Soon — Join the Waitlist</span>';
  html += '</div>';

  document.getElementById('appRoot').innerHTML = html;
  bindEvents();
}

function renderCleanState() {
  return '<div class="clean-state animate">' +
    '<div class="clean-icon">&#x2705;</div>' +
    '<h2 class="clean-title">Your store is clean.</h2>' +
    '<p class="clean-sub">No open violations detected in your latest scan. Your registry record reflects this. We\'ll continue monitoring weekly.</p>' +
    '</div>';
}

function renderViolations(score, critical, fixStatus) {
  // Build violations from what we know about their categories
  // We use a synthesized list based on severity — real data comes from receipt
  var violations = buildViolationList(critical, fixStatus);

  if (violations.length === 0) {
    return renderCleanState();
  }

  var html = '<p class="section-label">Open Issues (' + violations.length + ')</p>';

  violations.forEach(function(v, idx) {
    var info     = VIOLATION_INFO[v.category] || {};
    var isFixed  = markedFixed[v.category];
    var cardClass = 'violation-card animate' + (isFixed ? ' resolved' : '');

    html += '<div class="' + cardClass + '" id="card-' + v.category + '" data-category="' + v.category + '">';

    // Header
    html += '<div class="violation-header" onclick="toggleCard(\'' + v.category + '\')">';
    html += '<div class="violation-left">';
    html += '<span class="violation-severity sev-' + (info.severity || 'serious') + '">' + (info.severity || 'serious').toUpperCase() + '</span>';
    html += '<p class="violation-name">' + (info.name || v.category) + '</p>';
    html += '<p class="violation-plain">' + (info.plain || '') + '</p>';
    if (info.legal) html += '<p class="violation-legal">&#x2696; &nbsp;' + info.legal + '</p>';
    if (v.count > 0) html += '<p class="violation-count">' + v.count + ' instance' + (v.count !== 1 ? 's' : '') + ' found on your store</p>';
    html += '</div>';
    html += '<div class="violation-right">';
    html += '<span class="resolved-badge">&#x2713; Fixed</span>';
    html += '<span class="chevron">&#x2303;</span>';
    html += '</div>';
    html += '</div>';

    // Body
    html += '<div class="violation-body">';
    html += '<div style="padding-top:16px;">';
    html += '<p style="font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#D4A843;margin:0 0 12px;opacity:0.85;">How would you like to fix this?</p>';

    // Three fix paths
    html += '<div class="fix-paths">';

    // Path 1 — Shopify
    html += '<div class="fix-path" onclick="showGuide(\'' + v.category + '\',\'shopify\')">';
    html += '<div class="fix-path-icon">&#x1F6CD;</div>';
    html += '<p class="fix-path-title">Fix it myself</p>';
    html += '<p class="fix-path-desc">Step-by-step guide for Shopify — no code needed for most issues</p>';
    html += '<span class="fix-path-difficulty">' + (info.difficulty || '⭐⭐ Medium') + '</span>';
    html += '</div>';

    // Path 2 — Developer
    html += '<div class="fix-path" onclick="showGuide(\'' + v.category + '\',\'dev\')">';
    html += '<div class="fix-path-icon">&#x1F4E7;</div>';
    html += '<p class="fix-path-title">Send to my developer</p>';
    html += '<p class="fix-path-desc">Pre-written email with the fix details ready to forward</p>';
    html += '<span class="fix-path-difficulty">&#x1F4CB; Copy & send</span>';
    html += '</div>';

    // Path 3 — Code
    html += '<div class="fix-path" onclick="showGuide(\'' + v.category + '\',\'code\')">';
    html += '<div class="fix-path-icon">&#x1F4BB;</div>';
    html += '<p class="fix-path-title">See the code fix</p>';
    html += '<p class="fix-path-desc">Before/after code for developers who want the technical details</p>';
    html += '<span class="fix-path-difficulty">&#x2699; Technical</span>';
    html += '</div>';

    html += '</div>'; // .fix-paths

    // Guide panel (shown when path selected)
    html += '<div class="fix-guide" id="guide-' + v.category + '">';

    // Shopify guide
    html += '<div id="guide-' + v.category + '-shopify" class="guide-panel" style="display:none;">';
    html += '<h4>&#x1F6CD; Shopify Fix Guide</h4>';
    if (info.shopify_steps) {
      info.shopify_steps.forEach(function(step, i) {
        html += '<div class="guide-step">';
        html += '<span class="guide-step-num">' + (i+1) + '</span>';
        html += '<span class="guide-step-text">' + step.text + '</span>';
        html += '</div>';
      });
    }
    html += '</div>';

    // Dev email guide
    var devEmailBody = buildDevEmail(v.category, info, domain, v.count);
    html += '<div id="guide-' + v.category + '-dev" class="guide-panel" style="display:none;">';
    html += '<h4>&#x1F4E7; Forward This to Your Developer</h4>';
    html += '<div class="dev-email-box">';
    html += '<p class="dev-email-subject">Subject: Accessibility fix needed — ' + domain + '</p>';
    html += '<p class="dev-email-body" id="devbody-' + v.category + '">' + escHtml(devEmailBody) + '</p>';
    html += '</div>';
    html += '<button class="copy-btn" onclick="copyDevEmail(\'' + v.category + '\')">&#x270D; Copy to Clipboard</button>';
    html += '</div>';

    // Code guide
    html += '<div id="guide-' + v.category + '-code" class="guide-panel" style="display:none;">';
    html += '<h4>&#x1F4BB; Code Fix</h4>';
    html += '<p class="code-label code-bad">&#x2717; Before (violation)</p>';
    html += '<div class="code-block code-bad">' + escHtml(info.code_before || '') + '</div>';
    html += '<p class="code-label code-good">&#x2713; After (corrected)</p>';
    html += '<div class="code-block code-good">' + escHtml(info.code_after || '') + '</div>';
    html += '</div>';

    html += '</div>'; // .fix-guide

    // Mark as fixed
    if (!isFixed) {
      html += '<div class="mark-fixed-row">';
      html += '<button class="mark-fixed-btn" onclick="markFixed(\'' + v.category + '\')">&#x2713; I\'ve Fixed This</button>';
      html += '<span class="mark-fixed-note">We\'ll verify it automatically when you submit</span>';
      html += '</div>';
    }

    html += '</div>'; // .violation-body
    html += '</div>'; // .violation-card
  });

  // Submit section
  html += '<div class="submit-section animate">';
  html += '<p class="submit-title">Ready to verify your fixes?</p>';
  html += '<p class="submit-sub">Mark each issue you\'ve addressed above, then submit. We\'ll run a confirmation scan and email you the result.</p>';
  html += '<button class="submit-btn" id="submitBtn" onclick="submitFixes()">';
  html += '<span class="submit-spinner" id="submitSpinner"></span>';
  html += 'Submit for Confirmation Scan';
  html += '</button>';
  html += '</div>';

  return html;
}

// ── Violation list builder ────────────────────────────────────────────────────
function buildViolationList(critical, fixStatus) {
  // Build from VIOLATION_INFO categories — show all that have issues
  // In production this comes from the latest receipt via the registry
  var cats = Object.keys(VIOLATION_INFO);
  var list = [];
  // For now show all categories — the actual data comes from the registry scan
  // The fix-status endpoint tells us what's pending
  var pending = (fixStatus.summary && fixStatus.summary.pending) ? fixStatus.summary.pending : [];
  var pendingCats = pending.map(function(p) { return p.category; });

  cats.forEach(function(cat) {
    var info = VIOLATION_INFO[cat];
    // Show critical and serious issues always; others only if pending
    if (info.severity === 'critical' || info.severity === 'serious' || pendingCats.indexOf(cat) !== -1) {
      list.push({ category: cat, count: 0 });
    }
  });

  return list.slice(0, 6); // Max 6 shown
}

// ── Dev email builder ─────────────────────────────────────────────────────────
function buildDevEmail(category, info, domain, count) {
  return 'Hi,\n\nOur store (' + domain + ') failed an accessibility compliance scan and we need this fixed urgently. We could be at risk of ADA demand letters.\n\nISSUE: ' + (info.name || category) + '\nSEVERITY: ' + (info.severity || 'serious').toUpperCase() + '\nINSTANCES: ' + (count || 'Multiple') + ' found\n\nWHY IT MATTERS:\n' + (info.plain || '') + '\n\nTHE FIX:\n\nBefore:\n' + (info.code_before || '') + '\n\nAfter:\n' + (info.code_after || '') + '\n\nPlease fix this as soon as possible. Our monitoring system will automatically verify when it\'s resolved.\n\nThank you';
}

// ── Interactions ──────────────────────────────────────────────────────────────
function toggleCard(category) {
  var card = document.getElementById('card-' + category);
  if (!card) return;
  if (card.classList.contains('resolved')) return;
  card.classList.toggle('open');
}

function showGuide(category, type) {
  var guideEl = document.getElementById('guide-' + category);
  if (!guideEl) return;
  guideEl.classList.add('show');

  // Hide all sub-panels then show the right one
  ['shopify', 'dev', 'code'].forEach(function(t) {
    var el = document.getElementById('guide-' + category + '-' + t);
    if (el) el.style.display = 'none';
  });

  var target = document.getElementById('guide-' + category + '-' + type);
  if (target) target.style.display = 'block';
  activeGuide[category] = type;
}

function markFixed(category) {
  markedFixed[category] = true;
  var card = document.getElementById('card-' + category);
  if (card) {
    card.classList.remove('open');
    card.classList.add('resolved');
  }
}

function copyDevEmail(category) {
  var el = document.getElementById('devbody-' + category);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(function() {
    var btn = el.closest('.guide-panel').querySelector('.copy-btn');
    if (btn) {
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '✍ Copy to Clipboard';
        btn.classList.remove('copied');
      }, 2500);
    }
  });
}

function submitFixes() {
  var fixed = Object.keys(markedFixed).filter(function(k) { return markedFixed[k]; });
  if (fixed.length === 0) {
    alert('Please mark at least one issue as fixed before submitting.');
    return;
  }

  var btn = document.getElementById('submitBtn');
  var spinner = document.getElementById('submitSpinner');
  btn.disabled = true;
  if (spinner) spinner.style.display = 'inline-block';
  btn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(6,8,15,0.25);border-top-color:#06080F;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:8px;"></span>Running confirmation scan&hellip;';

  // We need email + receipt_id — prompt if not in URL params
  var params   = new URLSearchParams(window.location.search);
  var email    = params.get('email') || '';
  var receiptId = params.get('receipt') || 'IDR-PENDING';

  if (!email) {
    email = prompt('Please enter your email address to verify your fix:');
    if (!email || email.indexOf('@') === -1) {
      btn.disabled = false;
      btn.innerHTML = 'Submit for Confirmation Scan';
      if (spinner) spinner.style.display = 'none';
      return;
    }
  }

  fetch(BACKEND + '/api/fix-report', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email:      email,
      domain:     domain,
      receipt_id: receiptId,
      categories: fixed
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    btn.style.display = 'none';
    var banner = document.getElementById('successBanner');
    if (banner) banner.classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  })
  .catch(function() {
    btn.disabled = false;
    btn.innerHTML = 'Submit for Confirmation Scan';
    if (spinner) spinner.style.display = 'none';
    alert('Something went wrong. Please try again or contact hello@idrshield.com');
  });
}

function bindEvents() {
  // Any additional event binding after render
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showError(title, sub) {
  document.getElementById('appRoot').innerHTML =
    '<div class="error-state">' +
    '<div class="error-icon">&#x26A0;</div>' +
    '<h2 class="error-title">' + title + '</h2>' +
    '<p class="error-sub">' + sub + '</p>' +
    '</div>';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

})();
</script>
</body>
</html>
